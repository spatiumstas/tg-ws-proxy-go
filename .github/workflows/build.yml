name: Build tg-ws-proxy

on:
  workflow_dispatch:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare build matrix
    runs-on: ubuntu-latest
    outputs:
      configs: ${{ steps.collect.outputs.configs }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build config matrix
        id: collect
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          configs = sorted(Path("config").glob("*/*.config"))

          if not configs:
              raise SystemExit("No build configs found")

          matrix = []
          for config in configs:
              matrix.append({
                  "config": config.as_posix(),
                  "name": config.stem,
              })

          print(f"configs={json.dumps(matrix, separators=(',', ':'))}")
          PY

  build:
    name: Build packages (${{ matrix.name }})
    needs: prepare
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.configs) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: src/go.mod
          cache: true
          cache-dependency-path: src/go.sum

      - name: Build and package
        run: |
          cp "${{ matrix.config }}" .config
          make package

      - name: Collect package files
        id: package_outputs
        run: |
          mapfile -t packages < <(find .build -maxdepth 1 -type f -name 'tg-ws-proxy_*.ipk' | sort)
          if [ ${#packages[@]} -eq 0 ]; then
            echo "No package files found" >&2
            exit 1
          fi
          if [ ${#packages[@]} -gt 1 ]; then
            echo "Expected one package file, found ${#packages[@]}" >&2
            printf '%s\n' "${packages[@]}"
            exit 1
          fi
          echo "package_path=${packages[0]}" >> "$GITHUB_OUTPUT"
          echo "package_name=$(basename "${packages[0]}")" >> "$GITHUB_OUTPUT"

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package_outputs.outputs.package_name }}
          path: ${{ steps.package_outputs.outputs.package_path }}
          if-no-files-found: error
          compression-level: 0

      - name: Upload package asset to release
        if: ${{ github.event_name == 'release' }}
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package_outputs.outputs.package_path }}

  publish-latest-release:
    runs-on: ubuntu-latest
    needs: [ build ]
    env:
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: out
          merge-multiple: true

      - name: Resolve latest target release
        id: target-release
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });

            const picked = releases.find((rel) => !rel.draft && !rel.prerelease);
            if (!picked) {
              core.setFailed('No release found to update');
              return;
            }

            core.setOutput('id', String(picked.id));
            core.setOutput('tag', picked.tag_name);

      - name: Remove previous ipk assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ steps.target-release.outputs.id }}
        run: |
          gh api "repos/${{ github.repository }}/releases/${RELEASE_ID}/assets" \
            --jq '.[] | select(.name | test("^tg-ws-proxy.*\\.ipk$")) | .id' \
            | while read -r asset_id; do
                [ -n "$asset_id" ] || continue
                gh api -X DELETE "repos/${{ github.repository }}/releases/assets/${asset_id}"
              done

      - name: Upload new ipk assets to latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.target-release.outputs.tag }}
        run: |
          mapfile -t files < <(find out -type f -name 'tg-ws-proxy_*.ipk' | sort)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No ipk files found"
            exit 1
          fi

          printf '%s\n' "${files[@]}"
          gh release upload "$TAG" "${files[@]}" --clobber

      - name: Dispatch to feedly
        if: success()
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${{ secrets.AGGREGATOR_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/spatiumstas/feedly/dispatches \
            -d '{"event_type":"package-built","client_payload":{"package":"'"${{ github.repository }}"'","channel":"release","tag":"'"${{ steps.target-release.outputs.tag }}"'"}}'